<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Renson Ecopark WiFi</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- MONETAG (OK pero optional) -->
<script src="https://quge5.com/88/tag.min.js" data-zone="233397" async data-cfasync="false"></script>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #000;
    color: #fff;
    text-align: center;
}

.container {
    padding: 20px;
    margin-top: 60px;
}

video {
    width: 100%;
    max-width: 400px;
    border-radius: 10px;
}

button {
    margin-top: 20px;
    padding: 12px 25px;
    font-size: 16px;
    background: #00c853;
    border: none;
    border-radius: 5px;
    color: white;
    cursor: pointer;
}

button:disabled {
    background: gray;
}
</style>

</head>

<body>

<div class="container">

<h2>Welcome to Renson Ecopark WiFi</h2>
<p>Watch muna bago makaconnect</p>

<video id="adsVideo" autoplay muted playsinline>
    <source src="ad.mp4" type="video/mp4">
</video>

<br>

<button id="connectBtn" disabled onclick="goLogin()">CONNECT</button>

</div>

<script>
let video = document.getElementById("adsVideo");
let btn = document.getElementById("connectBtn");

// enable button after video ends
video.onended = function() {
    btn.disabled = false;
};

// fallback timer (para di ma-stuck)
setTimeout(function(){
    btn.disabled = false;
}, 10000);

// IMPORTANT: redirect to MikroTik login page
function goLogin(){
    window.location.href = "http://192.168.22.1/login2";
}
</script>

</body>
</html>
