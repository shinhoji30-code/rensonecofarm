<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Renson Barangay WiFi & EcoFarm Services</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- MONETAG ADS -->
<script src="https://quge5.com/88/tag.min.js"
data-zone="233397" async data-cfasync="false"></script>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #000;
    color: #fff;
    text-align: center;
}

/* TOP MENU */
.top-menu {
    position: fixed;
    top: 0;
    width: 100%;
    background: rgba(0,0,0,0.9);
    display: flex;
    justify-content: space-around;
    padding: 12px 0;
    z-index: 999;
    box-shadow: 0 0 10px rgba(0,0,0,0.5);
}

.top-menu a {
    color: white;
    text-decoration: none;
    font-size: 13px;
    font-weight: bold;
}

.top-menu a:hover {
    color: #00c853;
}

/* MAIN */
.container {
    padding: 20px;
    margin-top: 80px;
}

h2 {
    font-size: 20px;
}

video {
    width: 100%;
    max-width: 400px;
    border-radius: 10px;
    margin-top: 10px;
}

/* BUTTONS */
button {
    margin-top: 15px;
    padding: 12px 20px;
    font-size: 15px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    width: 80%;
    max-width: 300px;
}

#connectBtn { background: #00c853; color: white; }
#gameBtn { background: #2979ff; color: white; }
#bookBtn { background: #ff9800; color: white; }
.watchTV { background: #e53935; color: white; }

button:disabled { background: gray; }

/* TIMER */
#statusText {
    margin-top: 10px;
    font-size: 14px;
    color: #ccc;
}

#progressContainer {
    width: 80%;
    max-width: 300px;
    height: 8px;
    background: #333;
    border-radius: 5px;
    margin: 10px auto;
    overflow: hidden;
}

#progressBar {
    width: 0%;
    height: 100%;
    background: #00c853;
    transition: width 1s linear;
}
</style>
</head>

<body>

<!-- TOP MENU -->
<div class="top-menu">
    <a href="index.html">🏠 Home</a>
    <a href="watch.html">📺 Watch</a>
    <a href="rensonchatroom.html">💬 Chat</a>
    <a href="booking.html">🏡 Booking</a>
</div>

<div class="container">

<h2>🎮 Renson Barangay WiFi & EcoFarm Services</h2>

<!-- VIDEO -->
<video id="adsVideo" autoplay muted playsinline>
    <source src="ad.mp4" type="video/mp4">
</video>

<p id="statusText">Please wait 10 seconds...</p>

<div id="progressContainer">
  <div id="progressBar"></div>
</div>

<!-- ADS SPACE -->
<div class="ad-box"></div>

<!-- MAIN BUTTONS -->
<button id="connectBtn" disabled onclick="goLogin()">CONNECT INTERNET 🌐</button>
<button id="gameBtn" disabled onclick="goGames()">PLAY GAMES 🎮</button>
<button id="bookBtn" disabled onclick="goBooking()">BOOK ROOMS 🏡</button>

<button class="watchTV" onclick="goWatch()">📺 WATCH FREE TV</button>

<!-- 🔥 FREE WIFI BUTTON -->
<button style="
background:#00c853;
color:white;
margin-top:15px;
padding:12px 20px;
font-size:15px;
border:none;
border-radius:6px;
cursor:pointer;
width:80%;
max-width:300px;
"
onclick="goTrial()">
⚡ FREE WIFI (15 MIN)
</button>

</div>

<!-- MUSIC -->
<audio id="bgmusic" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script>

let video = document.getElementById("adsVideo");
let connectBtn = document.getElementById("connectBtn");
let gameBtn = document.getElementById("gameBtn");
let bookBtn = document.getElementById("bookBtn");

video.onended = unlock;
setTimeout(unlock, 10000);

function unlock(){
    connectBtn.disabled = false;
    gameBtn.disabled = false;
    bookBtn.disabled = false;
}

/* NAVIGATION */
function goLogin(){
    window.location.href = "http://192.168.22.1/login2.html";
}

function goGames(){
    window.location.href = "https://rensonecoparkphil.com/snake/";
}

function goBooking(){
    window.location.href = "booking.html";
}

function goWatch(){
    window.location.href = "watch.html";
}

/* 🔥 FREE WIFI (TRIAL) */
function goTrial(){
    window.location.href = "http://192.168.22.1/login?username=T-$(mac-esc)&dst=$(link-orig-esc)";
}

/* MUSIC */
document.body.addEventListener("click", function () {
    let music = document.getElementById("bgmusic");
    music.volume = 0.2;
    music.play().catch(()=>{});
}, { once: true });

/* TIMER */
let duration = 10;
let timeLeft = duration;

let progressBar = document.getElementById("progressBar");
let statusText = document.getElementById("statusText");

let intervalUI = setInterval(function(){

    timeLeft--;

    progressBar.style.width = ((duration - timeLeft) / duration) * 100 + "%";
    statusText.innerText = "Please wait " + timeLeft + " seconds...";

    if(timeLeft <= 0){
        clearInterval(intervalUI);
        statusText.innerText = "You can now proceed!";
    }

},1000);

</script>

</body>
</html>
