<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Renson Ecopark WiFi Portal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

crossorigin="anonymous"></script>

<!-- MONETAG ADS -->
<script src="https://quge5.com/88/tag.min.js" 
data-zone="233397" async data-cfasync="false"></script>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #000;
    color: #fff;
    text-align: center;
}

.container {
    padding: 20px;
    margin-top: 40px;
}

h2 {
    font-size: 20px;
}

/* VIDEO AD */
video {
    width: 100%;
    max-width: 400px;
    border-radius: 10px;
    margin-top: 10px;
}

button {
    margin-top: 15px;
    padding: 12px 20px;
    font-size: 15px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    width: 80%;
    max-width: 300px;
}

#connectBtn {
    background: #00c853;
    color: white;
}

#gameBtn {
    background: #2979ff;
    color: white;
}

#bookBtn {
    background: #ff9800;
    color: white;
}

button:disabled {
    background: gray;
}

/* ADS */
.ad-box {
    margin: 10px 0;
}

/* TIMER UI */
#statusText {
    margin-top: 10px;
    font-size: 14px;
    color: #ccc;
}

#progressContainer {
    width: 80%;
    max-width: 300px;
    height: 8px;
    background: #333;
    border-radius: 5px;
    margin: 10px auto;
    overflow: hidden;
}

#progressBar {
    width: 0%;
    height: 100%;
    background: #00c853;
    transition: width 1s linear;
}

/* TV MENU */
.tv-menu {
    margin-top: 20px;
    padding: 10px;
}

.tv-menu h3 {
    font-size: 16px;
    color: #ffcc00;
}

.tv-menu button {
    background: #e53935;
    color: white;
    margin: 5px;
    padding: 10px;
    border-radius: 8px;
    width: 80%;
    max-width: 300px;
}

#tvscreen {
    width: 90%;
    height: 220px;
    margin-top: 10px;
    border: none;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">

<h2>🎮 Renson Ecopark & Barangay WiFi Access Portal</h2>
<p>Watch short ad before access</p>

<!-- VIDEO AD -->
<video id="adsVideo" autoplay muted playsinline>
    <source src="ad.mp4" type="video/mp4">
</video>

<!-- TIMER -->
<p id="statusText">Please wait 10 seconds...</p>
<div id="progressContainer">
  <div id="progressBar"></div>
</div>

<!-- ADS -->
<div class="ad-box"></div>

<script>
  atOptions = {
    'key' : 'b2f331153ebe7677a3e5f2d39f278655',
    'format' : 'iframe',
    'height' : 250,
    'width' : 300,
    'params' : {}
  };
</script>
<script src="https://www.highperformanceformat.com/b2f331153ebe7677a3e5f2d39f278655/invoke.js"></script>

<!-- TV MENU -->
<div class="tv-menu">

<h3>📺 Watch Free TV</h3>

<button onclick="playTV('https://www.youtube.com/embed/NwMT6vEGKJ8?autoplay=1&mute=1&controls=0')">
ABS-CBN LIVE
</button>

<button onclick="playTV('https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1')">
Sample Channel
</button>

<iframe id="tvscreen"></iframe>

</div>

<!-- MAIN BUTTONS -->
<button id="connectBtn" disabled onclick="goLogin()">
CONNECT INTERNET 🌐
</button>

<button id="gameBtn" disabled onclick="goGames()">
PLAY GAMES 🎮
</button>

<button id="bookBtn" disabled onclick="goBooking()">
BOOK ROOMS 🏡
</button>

</div>

<!-- BACKGROUND MUSIC -->
<audio id="bgmusic" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
let video = document.getElementById("adsVideo");
let connectBtn = document.getElementById("connectBtn");
let gameBtn = document.getElementById("gameBtn");
let bookBtn = document.getElementById("bookBtn");

video.onended = function() {
    unlock();
};

setTimeout(function(){
    unlock();
}, 10000);

function unlock(){
    connectBtn.disabled = false;
    gameBtn.disabled = false;
    bookBtn.disabled = false;
}

/* NAVIGATION */
function goLogin(){
    window.location.href = "http://192.168.22.1/login2.html";
}

function goGames(){
    window.location.href = "https://rensonecoparkphil.com/snake/";
}

function goBooking(){
    window.location.href = "booking.html";
}

/* TV PLAYER */
function playTV(url){
    document.getElementById("tvscreen").src = url;
}

/* MUSIC */
document.body.addEventListener("click", function () {
    let music = document.getElementById("bgmusic");
    music.volume = 0.2;
    music.play().catch(()=>{});
}, { once: true });

/* TIMER UI */
let duration = 10;
let timeLeft = duration;

let progressBar = document.getElementById("progressBar");
let statusText = document.getElementById("statusText");

let intervalUI = setInterval(function(){
    timeLeft--;

    let progress = ((duration - timeLeft) / duration) * 100;
    progressBar.style.width = progress + "%";

    statusText.innerText = "Please wait " + timeLeft + " seconds...";

    if(timeLeft <= 0){
        clearInterval(intervalUI);
        statusText.innerText = "You can now proceed!";
    }
}, 1000);

</script>

</body>
</html>
