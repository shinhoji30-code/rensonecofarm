<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Renson Barangay WiFi & EcoFarm Services</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to bottom, #000, #111);
    color:white;
    text-align:center;
}

/* TOP MENU */
.top-menu {
    position: fixed;
    top: 0;
    width: 100%;
    background: rgba(0,0,0,0.95);
    display: flex;
    gap: 12px;
    padding: 12px 10px;
    overflow-x: auto;
    white-space: nowrap;
    z-index: 999;
    border-bottom:1px solid #222;
}

.top-menu::-webkit-scrollbar{
    display:none;
}

.top-menu a {
    color: white;
    text-decoration: none;
    font-size: 13px;
    font-weight: bold;
    padding:8px 12px;
    border-radius:8px;
    background:#111;
    transition:0.2s;
}

.top-menu a:hover{
    background:#00c853;
    color:black;
}

.container {
    padding:20px;
    margin-top:90px;
}

h2 { font-size:18px; }

#dateTime{
    margin-top:10px;
    margin-bottom:10px;
    color:#00e676;
    font-size:15px;
    font-weight:bold;
}

.box{
    background:#111;
    color:#ccc;
    padding:10px;
    border-radius:10px;
    margin-bottom:15px;
    border:1px solid #222;
    font-size:14px;
    text-align:left;
}

.news-ticker {
    background:#111;
    border:1px solid #222;
    padding:10px;
    margin-bottom:15px;
    border-radius:10px;
    overflow:hidden;
    white-space:nowrap;
    font-size:13px;
    color:#00e676;
}

#newsText {
    display:inline-block;
    padding-left:100%;
    animation: scrollNews 18s linear infinite;
}

@keyframes scrollNews {
    0% { transform: translateX(0); }
    100% { transform: translateX(-100%); }
}

video {
    width:100%;
    max-width:420px;
    border-radius:12px;
    margin-top:10px;
}

.btn-group {
    display:flex;
    flex-direction:column;
    gap:12px;
    margin-top:20px;
}

.btn {
    padding:16px;
    font-size:16px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
    width:90%;
    max-width:320px;
    margin:auto;
}

.connect { background:#00c853; }
.games { background:#2979ff; }
.booking { background:#ff9800; }
.watch { background:#e53935; }
.trial { background:#00e676; color:black; }
.vision { background:#8e24aa; }

.btn:disabled {
    background:gray;
    opacity:0.6;
}
</style>
</head>

<body>

<div class="top-menu">
    <a href="index.html">🏠 Home</a>
    <a href="watch.html">📺 Watch</a>
    <a href="rensonchatroom.html">💬 Chat</a>
    <a href="booking.html">🏡 Booking</a>
    <a href="vision.html">🌿 Vision</a>
</div>

<div class="container">

<h2>🎮 Renson Barangay WiFi & EcoFarm Services</h2>

<div id="dateTime"></div>

<div class="news-ticker">
📰 <span id="newsText">Loading local news...</span>
</div>

<div class="box">☀️ Weather Today: Sunny • 31°C</div>

<div class="box">
📰 LATEST NEWS<br><br>
🚧 Road rehabilitation ongoing<br>
🌾 Agriculture irrigation projects<br>
⚠️ Security updates<br>
</div>

<video autoplay muted playsinline loop>
    <source src="ad.mp4" type="video/mp4">
</video>

<div class="btn-group">

<button class="btn connect" id="connectBtn" disabled>CONNECT INTERNET 🌐</button>
<button class="btn games" id="gameBtn" disabled>PLAY GAMES 🎮</button>
<button class="btn booking" id="bookBtn" disabled>BOOK ROOMS 🏡</button>

<button class="btn watch">WATCH FREE TV 📺</button>
<button class="btn trial">FREE WIFI (15 MIN) ⚡</button>
<button class="btn vision">🌿 Renson Vision</button>

</div>

</div>

<audio id="bgmusic" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- ✅ MONETAG SCRIPT (FIXED) -->
<script src="https://n6wxm.com/vignette.min.js" data-zone="10950262" async></script>

<script>

/* unlock buttons */
setTimeout(() => {
    connectBtn.disabled = false;
    gameBtn.disabled = false;
    bookBtn.disabled = false;
}, 10000);

/* music */
document.body.addEventListener("click", function () {
    let music = document.getElementById("bgmusic");
    music.volume = 0.2;
    music.play().catch(()=>{});
}, { once: true });

/* time */
setInterval(() => {
    let now = new Date();
    document.getElementById("dateTime").innerHTML =
    "📅 " + now.toLocaleDateString() +
    "<br>🕒 " + now.toLocaleTimeString();
}, 1000);

/* news */
const newsList = [
"Lopez road improvement ongoing",
"Calauag cyber operations active",
"Quezon irrigation expansion",
"Barangay WiFi maintenance"
];

let index = 0;
function updateNews(){
    document.getElementById("newsText").innerText = newsList[index];
    index = (index + 1) % newsList.length;
}
updateNews();
setInterval(updateNews, 6000);

</script>

</body>
</html>
