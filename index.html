<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Renson Ecopark WiFi Portal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- MONETAG ADS -->
<script src="https://quge5.com/88/tag.min.js" 
data-zone="233397" async data-cfasync="false"></script>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #000;
    color: #fff;
    text-align: center;
}

.container {
    padding: 20px;
    margin-top: 40px;
}

h2 {
    font-size: 20px;
}

video {
    width: 100%;
    max-width: 400px;
    border-radius: 10px;
    margin-top: 10px;
}

button {
    margin-top: 15px;
    padding: 12px 20px;
    font-size: 15px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    width: 80%;
    max-width: 300px;
}

#connectBtn {
    background: #00c853;
    color: white;
}

#gameBtn {
    background: #2979ff;
    color: white;
}

button:disabled {
    background: gray;
}

.ad-box {
    margin: 10px 0;
}
</style>

</head>

<body>

<div class="container">

<h2>🎮 Welcome to Renson Ecopark WiFi</h2>
<p>Watch short ad before access</p>

<!-- VIDEO AD -->
<video id="adsVideo" autoplay muted playsinline>
    <source src="ad.mp4" type="video/mp4">
</video>

<!-- MONETAG BANNER (optional placement) -->
<div class="ad-box">
    <!-- Banner ads will appear here -->
</div>

<!-- BUTTONS -->
<button id="connectBtn" disabled onclick="goLogin()">
CONNECT INTERNET 🌐
</button>

<button id="gameBtn" disabled onclick="goGames()">
PLAY GAMES 🎮
</button>

</div>

<script>
let video = document.getElementById("adsVideo");
let connectBtn = document.getElementById("connectBtn");
let gameBtn = document.getElementById("gameBtn");

// unlock buttons after video ends
video.onended = function() {
    unlock();
};

// fallback timer (10 sec)
setTimeout(function(){
    unlock();
}, 10000);

function unlock(){
    connectBtn.disabled = false;
    gameBtn.disabled = false;
}

// CONNECT → MikroTik login
function goLogin(){
    window.location.href = "http://192.168.22.1/login2.html";
}

// GAMES → GitHub page
function goGames(){
    window.location.href = "https://YOUR-GITHUB-USERNAME.github.io/";
}
</script>

</body>
</html>
