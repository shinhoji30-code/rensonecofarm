<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Renson Ecopark WiFi Portal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- ADSENSE -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8490044720475534"
crossorigin="anonymous"></script>

<!-- MONETAG ADS -->
<script src="https://quge5.com/88/tag.min.js" 
data-zone="233397" async data-cfasync="false"></script>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #000;
    color: #fff;
    text-align: center;
}

.container {
    padding: 20px;
    margin-top: 40px;
}

h2 {
    font-size: 20px;
}

video {
    width: 100%;
    max-width: 400px;
    border-radius: 10px;
    margin-top: 10px;
}

button {
    margin-top: 15px;
    padding: 12px 20px;
    font-size: 15px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    width: 80%;
    max-width: 300px;
}

#connectBtn { background: #00c853; color: white; }
#gameBtn { background: #2979ff; color: white; }
#bookBtn { background: #ff9800; color: white; }

button:disabled { background: gray; }

.ad-box { margin: 10px 0; }

#statusText {
    margin-top: 10px;
    font-size: 14px;
    color: #ccc;
}

#progressContainer {
    width: 80%;
    max-width: 300px;
    height: 8px;
    background: #333;
    border-radius: 5px;
    margin: 10px auto;
    overflow: hidden;
}

#progressBar {
    width: 0%;
    height: 100%;
    background: #00c853;
    transition: width 1s linear;
}

/* TV */
.tv-menu {
    margin-top: 20px;
}

.tv-menu h3 {
    color: #ffcc00;
    font-size: 16px;
}

.tv-menu button {
    background: #e53935;
    color: white;
    margin: 5px;
}

#tvscreen {
    width: 90%;
    height: 220px;
    margin-top: 10px;
    border: none;
    border-radius: 10px;
    background: black;
}
</style>
</head>

<body>

<div class="container">

<h2>🎮 Renson Ecopark WiFi Portal</h2>

<video id="adsVideo" autoplay muted playsinline>
    <source src="ad.mp4" type="video/mp4">
</video>

<p id="statusText">Please wait 10 seconds...</p>

<div id="progressContainer">
  <div id="progressBar"></div>
</div>

<div class="ad-box"></div>

<!-- TV MENU FIXED -->
<div class="tv-menu">

<h3>📺 Watch Free TV</h3>

<button onclick="playTV('https://www.youtube.com/embed/NwMT6vEGKJ8?autoplay=1&controls=0&rel=0&mute=1')">
ABS-CBN LIVE
</button>

<button onclick="playTV('https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1&controls=0&mute=1')">
Sample Channel
</button>

<button onclick="enableSound()">
🔊 TURN ON SOUND
</button>

<iframe id="tvscreen"
allow="autoplay; fullscreen"
allowfullscreen></iframe>

</div>

<!-- MAIN BUTTONS -->
<button id="connectBtn" disabled onclick="goLogin()">CONNECT INTERNET 🌐</button>
<button id="gameBtn" disabled onclick="goGames()">PLAY GAMES 🎮</button>
<button id="bookBtn" disabled onclick="goBooking()">BOOK ROOMS 🏡</button>

</div>

<audio id="bgmusic" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
let video = document.getElementById("adsVideo");
let connectBtn = document.getElementById("connectBtn");
let gameBtn = document.getElementById("gameBtn");
let bookBtn = document.getElementById("bookBtn");

video.onended = unlock;
setTimeout(unlock, 10000);

function unlock(){
    connectBtn.disabled = false;
    gameBtn.disabled = false;
    bookBtn.disabled = false;
}

/* NAV */
function goLogin(){
    window.location.href = "http://192.168.22.1/login2.html";
}

function goGames(){
    window.location.href = "https://rensonecoparkphil.com/snake/";
}

function goBooking(){
    window.location.href = "booking.html";
}

/* TV FIX */
function playTV(url){
    document.getElementById("tvscreen").src = url;
}

/* SOUND FIX (browser limitation workaround) */
function enableSound(){
    let iframe = document.getElementById("tvscreen");
    iframe.src = iframe.src.replace("mute=1","mute=0");
}

/* MUSIC */
document.body.addEventListener("click", function () {
    let music = document.getElementById("bgmusic");
    music.volume = 0.2;
    music.play().catch(()=>{});
}, { once: true });

/* TIMER */
let duration = 10;
let timeLeft = duration;

let progressBar = document.getElementById("progressBar");
let statusText = document.getElementById("statusText");

let intervalUI = setInterval(function(){
    timeLeft--;

    progressBar.style.width = ((duration - timeLeft) / duration) * 100 + "%";
    statusText.innerText = "Please wait " + timeLeft + " seconds...";

    if(timeLeft <= 0){
        clearInterval(intervalUI);
        statusText.innerText = "You can now proceed!";
    }
}, 1000);

</script>

</body>
</html>
