<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Renson Barangay WiFi & EcoFarm Services</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- MONETAG -->
<script src="https://quge5.com/88/tag.min.js" 
data-zone="233397" async data-cfasync="false"></script>

<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to bottom, #000, #111);
    color:white;
    text-align:center;
}

/* TOP BAR */
.top-bar{
    position:fixed;
    top:0;
    width:100%;
    background: rgba(0,0,0,0.9);
    backdrop-filter: blur(10px);
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px;
    z-index:999;
}

.logo{
    font-size:15px;
    font-weight:bold;
}

.menu-toggle{
    font-size:24px;
    cursor:pointer;
}

/* SIDE MENU (MOBILE) */
.menu{
    position:fixed;
    top:0;
    left:-260px;
    width:260px;
    height:100%;
    background:#111;
    padding-top:60px;
    display:flex;
    flex-direction:column;
    transition:0.3s ease;
    z-index:998;
}

.menu.active{
    left:0;
}

.menu a{
    padding:14px;
    border-bottom:1px solid #222;
    text-decoration:none;
    color:white;
    text-align:left;
}

/* OVERLAY */
.overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    display:none;
    z-index:997;
}
.overlay.active{
    display:block;
}

/* DESKTOP MENU */
@media(min-width:768px){
    .menu{
        position:fixed;
        top:50px;
        left:0;
        height:auto;
        width:100%;
        flex-direction:row;
        justify-content:center;
        background: rgba(0,0,0,0.85);
        padding:10px;
    }

    .menu a{
        border:none;
        margin:5px;
        background: rgba(255,255,255,0.08);
        border-radius:20px;
    }

    .menu-toggle{
        display:none;
    }

    .overlay{
        display:none !important;
    }
}

/* CONTAINER */
.container {
    padding:20px;
    margin-top:80px;
    margin-bottom:100px;
}

h2 { font-size:18px; }

#dateTime{
    margin:10px 0;
    color:#00e676;
    font-size:15px;
    font-weight:bold;
}

/* BOX */
.box{
    background:#111;
    color:#ccc;
    padding:12px;
    border-radius:10px;
    margin-bottom:15px;
    border:1px solid #222;
    text-align:left;
}

/* VIDEO */
video {
    width:100%;
    max-width:420px;
    border-radius:12px;
}

/* TIMER */
#statusText {
    margin-top: 12px;
    font-size: 15px;
    color: #00e676;
}

#progressContainer {
    width: 90%;
    max-width: 320px;
    height: 10px;
    background: rgba(255,255,255,0.08);
    border-radius: 50px;
    margin: 12px auto;
}

#progressBar {
    width: 0%;
    height: 100%;
    background: #00c853;
}

/* BUTTONS */
.bottom-buttons {
    position: fixed;
    bottom: 0;
    width: 100%;
    display: flex;
    padding:10px;
    background:#000;
}

button {
    flex:1;
    padding:15px;
    border:none;
    border-radius:30px;
    font-size:16px;
    font-weight:bold;
}

.connect{ background:#00c853; }
.trial{ background:#00e676; }

</style>
</head>

<body>

<!-- TOP -->
<div class="top-bar">
    <div class="logo">🌿 Renson WiFi</div>
    <div class="menu-toggle" onclick="toggleMenu()">☰</div>
</div>

<!-- MENU -->
<div id="menu" class="menu">
<a href="index.html">🏠 Home</a>
<a href="watch.html">📺 Watch TV</a>
<a href="games.html">🎮 Games</a>
<a href="booking.html">🏡 Booking</a>
</div>

<div id="overlay" class="overlay" onclick="closeMenu()"></div>

<div class="container">

<h2>🎮 Renson Barangay WiFi</h2>

<div id="dateTime"></div>

<div class="box">☀️ Weather: Sunny • 31°C</div>

<video autoplay muted loop>
<source src="ad.mp4">
</video>

<p id="statusText">Loading...</p>

<div id="progressContainer">
<div id="progressBar"></div>
</div>

</div>

<div class="bottom-buttons">
<button id="connectBtn" class="connect" disabled onclick="connectNet()">CONNECT</button>
<button class="trial" onclick="freeWifi()">FREE WIFI</button>
</div>

<audio id="bgmusic" loop>
<source src="music.mp3">
</audio>

<script>

/* MENU */
function toggleMenu(){
    document.getElementById("menu").classList.toggle("active");
    document.getElementById("overlay").classList.toggle("active");
}

function closeMenu(){
    document.getElementById("menu").classList.remove("active");
    document.getElementById("overlay").classList.remove("active");
}

/* AUTO CLOSE */
document.querySelectorAll(".menu a").forEach(link=>{
    link.addEventListener("click", closeMenu);
});

/* WIFI */
function connectNet(){
    window.location.href="http://192.168.22.1/login2.html";
}
function freeWifi(){
    window.location.href="http://192.168.22.1/login?trial=1";
}

/* TIMER */
let t=10;
let bar=document.getElementById("progressBar");
let txt=document.getElementById("statusText");

let i=setInterval(()=>{
t--;
bar.style.width=(10-t)*10+"%";
txt.innerText="Please wait "+t+"s";

if(t<=0){
clearInterval(i);
txt.innerText="Ready!";
document.getElementById("connectBtn").disabled=false;
}
},1000);

/* TIME */
setInterval(()=>{
let d=new Date();
document.getElementById("dateTime").innerHTML=
"📅 "+d.toLocaleDateString()+"<br>🕒 "+d.toLocaleTimeString();
},1000);

/* MUSIC */
document.body.addEventListener("click",()=>{
let m=document.getElementById("bgmusic");
m.volume=0.2;
m.play().catch(()=>{});
},{once:true});

</script>

</body>
</html>
