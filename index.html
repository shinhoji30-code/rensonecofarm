<script>

/* CONNECT ACTION (FIXED) */
function connectNet(){
    window.location.href = "http://192.168.22.1/login2.html";
}

/* FREE WIFI ACTION */
function freeWifi(){
    window.location.href = "http://192.168.22.1/login?trial=1";
}

/* unlock connect (FIXED SAFE ACCESS) */
setTimeout(() => {
    document.getElementById("connectBtn").disabled = false;
}, 10000);

/* TIMER */
let duration = 10;
let timeLeft = duration;

let progressBar = document.getElementById("progressBar");
let statusText = document.getElementById("statusText");

let intervalUI = setInterval(() => {

    timeLeft--;

    progressBar.style.width =
    ((duration - timeLeft) / duration) * 100 + "%";

    statusText.innerText =
    "System loading... " + timeLeft + "s";

    if(timeLeft <= 0){
        clearInterval(intervalUI);
        statusText.innerText = "System Ready!";
    }

}, 1000);

/* MUSIC */
document.body.addEventListener("click", function () {
    let music = document.getElementById("bgmusic");
    music.volume = 0.2;
    music.play().catch(()=>{});
}, { once: true });

/* TIME */
setInterval(() => {
    let now = new Date();
    document.getElementById("dateTime").innerHTML =
    "📅 " + now.toLocaleDateString() +
    "<br>🕒 " + now.toLocaleTimeString();
}, 1000);

/* NEWS */
const newsList = [
"Lopez road improvement ongoing",
"Calauag cyber operations active",
"Quezon irrigation expansion",
"Barangay WiFi maintenance"
];

let index = 0;
function updateNews(){
    document.getElementById("newsText").innerText = newsList[index];
    index = (index + 1) % newsList.length;
}
updateNews();
setInterval(updateNews, 6000);

</script>
