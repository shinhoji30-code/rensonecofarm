<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Renson Barangay WiFi & EcoFarm Services</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(to bottom,#000,#111);
    color:white;
    text-align:center;
    overflow-x:hidden;
}

/* TOP BAR */
.top-bar{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    background:rgba(0,0,0,0.92);
    backdrop-filter:blur(10px);
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px 18px;
    z-index:1000;
    box-sizing:border-box;
}

.logo{
    font-size:15px;
    font-weight:bold;
}

.menu-toggle{
    font-size:28px;
    cursor:pointer;
}

/* MENU */
.menu{
    position:fixed;
    top:0;
    left:-280px;
    width:260px;
    height:100%;
    background:#111;
    padding-top:70px;
    display:flex;
    flex-direction:column;
    transition:0.3s;
    z-index:999;
}
.menu.active{left:0;}

.menu a{
    padding:14px;
    border-bottom:1px solid #222;
    text-decoration:none;
    color:white;
    text-align:left;
}

/* OVERLAY */
.overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    display:none;
    z-index:998;
}
.overlay.active{display:block;}

/* CONTENT */
.container{
    padding:20px;
    margin-top:80px;
    margin-bottom:100px;
}

#dateTime{
    margin:10px 0;
    color:#00e676;
    font-weight:bold;
}

/* BOX */
.box{
    background:#111;
    padding:12px;
    border-radius:10px;
    margin-bottom:15px;
    border:1px solid #222;
    text-align:left;
}

video{
    width:100%;
    max-width:420px;
    border-radius:12px;
}

/* PROGRESS */
#progressContainer{
    width:90%;
    max-width:320px;
    height:10px;
    background:rgba(255,255,255,0.08);
    border-radius:50px;
    margin:12px auto;
}
#progressBar{
    width:0%;
    height:100%;
    background:#00c853;
}

/* BUTTON */
.bottom-buttons{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    padding:12px;
    background:#000;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:16px;
    border:none;
    border-radius:40px;
    font-size:18px;
    font-weight:bold;
    background:#00c853;
}

</style>
</head>

<body>

<!-- TOP BAR -->
<div class="top-bar">
    <div class="logo">🌿 Renson WiFi</div>
    <div class="menu-toggle" onclick="toggleMenu()">☰</div>
</div>

<!-- MENU (UPDATED) -->
<div id="menu" class="menu">
    <a href="index.html">🏠 Home</a>
    <a href="vision.html">👁 Vision</a>
    <a href="chat.html">💬 Chat</a>
    <a href="games.html">🎮 Games</a>
    <a href="booking.html">🏡 Booking</a>
</div>

<div id="overlay" class="overlay" onclick="closeMenu()"></div>

<!-- CONTENT -->
<div class="container">

<h2>🎮 Renson Barangay WiFi</h2>

<div id="dateTime"></div>

<div class="box">☀️ Weather: Sunny • 31°C</div>

<video autoplay muted loop>
<source src="ad.mp4">
</video>

<p id="statusText">Watch ads to continue internet access</p>

<div id="progressContainer">
<div id="progressBar"></div>
</div>

</div>

<!-- BUTTON -->
<div class="bottom-buttons">
<button id="connectBtn" disabled onclick="connectNet()">CONNECT</button>
</div>

<!-- MUSIC -->
<audio id="bgmusic" loop>
<source src="music.mp3">
</audio>

<script>

/* MENU */
function toggleMenu(){
menu.classList.toggle("active");
overlay.classList.toggle("active");
}
function closeMenu(){
menu.classList.remove("active");
overlay.classList.remove("active");
}

/* TIMER */
let t=10;
let bar=document.getElementById("progressBar");
let txt=document.getElementById("statusText");
let btn=document.getElementById("connectBtn");

let timer=setInterval(()=>{
t--;
bar.style.width=((10-t)*10)+"%";
txt.innerText="Please wait "+t+"s";

if(t<=0){
clearInterval(timer);
txt.innerText="Tap CONNECT to watch ads";
btn.disabled=false;
}
},1000);

/* TIME */
setInterval(()=>{
let d=new Date();
dateTime.innerHTML="📅 "+d.toLocaleDateString()+"<br>🕒 "+d.toLocaleTimeString();
},1000);

/* MUSIC */
document.body.addEventListener("click",()=>{
let m=document.getElementById("bgmusic");
m.volume=0.2;
m.play().catch(()=>{});
},{once:true});

/* CONNECT LOGIC */
let adDone=false;

function connectNet(){

    if(adDone){
        window.location.href="http://192.168.22.1/login2.html";
        return;
    }

    let btn=document.getElementById("connectBtn");
    let txt=document.getElementById("statusText");

    btn.innerText="LOADING ADS...";
    btn.disabled=true;
    txt.innerText="Please wait... showing ads";

    loadVignette();

    setTimeout(()=>{
        adDone=true;
        window.location.href="http://192.168.22.1/login2.html";
    },5000);
}

/* MONETAG */
setTimeout(()=>{
let s=document.createElement('script');
s.dataset.zone='10932617';
s.src='https://nap5k.com/tag.min.js';
s.async=true;
document.body.appendChild(s);
},5000);

/* VIGNETTE */
let vignetteLoaded=false;
function loadVignette(){
if(vignetteLoaded) return;
vignetteLoaded=true;

let s=document.createElement('script');
s.dataset.zone='10950262';
s.src='https://n6wxm.com/vignette.min.js';
s.async=true;
document.body.appendChild(s);
}

</script>

</body>
</html>
