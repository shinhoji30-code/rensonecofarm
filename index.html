<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Renson Barangay WiFi & EcoFarm Services</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to bottom, #000, #111);
    color:white;
    text-align:center;
}

/* TOP MENU */
.top-menu {
    position: fixed;
    top: 0;
    width: 100%;
    background: rgba(0,0,0,0.9);
    display: flex;
    justify-content: space-around;
    padding: 12px 0;
    z-index: 999;
    border-bottom:1px solid #222;
}

.top-menu a {
    color: white;
    text-decoration: none;
    font-size: 13px;
    font-weight: bold;
}

/* MAIN */
.container {
    padding:20px;
    margin-top:80px;
}

/* TITLE */
h2 {
    font-size:18px;
}

/* DATE & TIME */
#dateTime{
    margin-top:10px;
    margin-bottom:10px;
    color:#00e676;
    font-size:15px;
    font-weight:bold;
}

/* MARQUEE */
marquee{
    background:#111;
    color:#00e676;
    padding:10px;
    border-radius:10px;
    margin-bottom:15px;
    font-size:14px;
    border:1px solid #222;
}

/* WEATHER */
.weather-box{
    background:#111;
    color:#ccc;
    padding:10px;
    border-radius:10px;
    margin-bottom:15px;
    border:1px solid #222;
    font-size:14px;
}

/* VIDEO */
video {
    width:100%;
    max-width:420px;
    border-radius:12px;
    margin-top:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.6);
}

/* BUTTON GROUP */
.btn-group {
    display:flex;
    flex-direction:column;
    gap:12px;
    margin-top:20px;
}

/* BUTTON STYLE */
.btn {
    padding:16px;
    font-size:16px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
    width:90%;
    max-width:320px;
    margin:auto;
    transition:0.2s;
}

.btn:hover {
    transform:scale(1.03);
    opacity:0.9;
}

/* COLORS */
.connect { background:#00c853; }
.games { background:#2979ff; }
.booking { background:#ff9800; }
.watch { background:#e53935; }
.trial { background:#00e676; color:black; }

/* DISABLED */
.btn:disabled {
    background:gray;
    opacity:0.6;
    cursor:not-allowed;
}

/* STATUS */
#statusText {
    margin-top:10px;
    font-size:14px;
    color:#ccc;
}

/* PROGRESS BAR */
#progressContainer {
    width:90%;
    max-width:320px;
    height:8px;
    background:#222;
    border-radius:5px;
    margin:10px auto;
}

#progressBar {
    width:0%;
    height:100%;
    background:#00c853;
}
</style>
</head>

<body>

<!-- TOP MENU -->
<div class="top-menu">
    <a href="index.html">🏠 Home</a>
    <a href="watch.html">📺 Watch</a>
    <a href="rensonchatroom.html">💬 Chat</a>
    <a href="booking.html">🏡 Booking</a>
</div>

<div class="container">

<h2>🎮 Renson Barangay WiFi & EcoFarm Services</h2>

<!-- DATE & TIME -->
<div id="dateTime"></div>

<!-- MARQUEE -->
<marquee behavior="scroll" direction="left">
🔥 Welcome to Renson Barangay WiFi • Fast Internet • EcoFarm Rooms • Free TV • Online Games • Enjoy Your Stay!
</marquee>

<!-- WEATHER -->
<div class="weather-box">
☀️ Weather Today: Sunny • 31°C
</div>

<!-- VIDEO -->
<video id="adsVideo" autoplay muted playsinline loop>
    <source src="ad.mp4" type="video/mp4">
</video>

<p id="statusText">Please wait 10 seconds...</p>

<div id="progressContainer">
  <div id="progressBar"></div>
</div>

<!-- BUTTONS -->
<div class="btn-group">

<button class="btn connect" id="connectBtn" disabled onclick="goLogin()">CONNECT INTERNET 🌐</button>

<button class="btn games" id="gameBtn" disabled onclick="goGames()">PLAY GAMES 🎮</button>

<button class="btn booking" id="bookBtn" disabled onclick="goBooking()">BOOK ROOMS 🏡</button>

<button class="btn watch" onclick="goWatch()">WATCH FREE TV 📺</button>

<button class="btn trial" onclick="goTrial()">FREE WIFI (15 MIN) ⚡</button>

</div>

</div>

<!-- MUSIC -->
<audio id="bgmusic" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script>

/* VIDEO TIMER */
let video = document.getElementById("adsVideo");
let connectBtn = document.getElementById("connectBtn");
let gameBtn = document.getElementById("gameBtn");
let bookBtn = document.getElementById("bookBtn");

video.onended = unlock;
setTimeout(unlock, 10000);

function unlock(){
    connectBtn.disabled = false;
    gameBtn.disabled = false;
    bookBtn.disabled = false;
}

/* NAVIGATION */
function goLogin(){
    window.location.href = "http://192.168.22.1/login2.html";
}

function goGames(){
    window.location.href = "https://rensonecoparkphil.com/snake/";
}

function goBooking(){
    window.location.href = "booking.html";
}

function goWatch(){
    window.location.href = "watch.html";
}

function goTrial(){
    window.location.href = "http://192.168.22.1/login?username=T-$(mac-esc)&dst=$(link-orig-esc)";
}

/* MUSIC */
document.body.addEventListener("click", function () {
    let music = document.getElementById("bgmusic");
    music.volume = 0.2;
    music.play().catch(()=>{});
}, { once: true });

/* TIMER */
let duration = 10;
let timeLeft = duration;

let progressBar = document.getElementById("progressBar");
let statusText = document.getElementById("statusText");

let intervalUI = setInterval(function(){

    timeLeft--;

    progressBar.style.width = ((duration - timeLeft) / duration) * 100 + "%";
    statusText.innerText = "Please wait " + timeLeft + " seconds...";

    if(timeLeft <= 0){
        clearInterval(intervalUI);
        statusText.innerText = "You can now proceed!";
    }

},1000);

/* DATE & TIME */
setInterval(function(){

    let now = new Date();

    let options = {
        weekday:'long',
        year:'numeric',
        month:'long',
        day:'numeric'
    };

    let date = now.toLocaleDateString('en-US', options);
    let time = now.toLocaleTimeString();

    document.getElementById("dateTime").innerHTML =
    "📅 " + date + "<br>🕒 " + time;

},1000);

</script>

</body>
</html>
