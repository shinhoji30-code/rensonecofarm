<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Renson Barangay WiFi & EcoFarm Services</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to bottom, #000, #111);
    color:white;
    text-align:center;
}

/* TOP MENU FULL */
.top-menu {
    position: fixed;
    top: 0;
    width: 100%;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(10px);
    display: flex;
    gap: 8px;
    padding: 10px;
    overflow-x: auto;
    white-space: nowrap;
    z-index: 999;
    border-bottom:1px solid rgba(255,255,255,0.1);
}

.top-menu::-webkit-scrollbar{
    display:none;
}

.top-menu a,
.top-menu button {
    color: white;
    text-decoration: none;
    font-size: 13px;
    font-weight: bold;
    padding:8px 14px;
    border-radius:20px;
    background: rgba(255,255,255,0.08);
    border:none;
    cursor:pointer;
    transition:0.2s;
}

.top-menu a:hover,
.top-menu button:hover {
    background:#00c853;
    color:black;
}

.connect { background:#00c853 !important; }
.trial { background:#00e676 !important; color:black !important; }

.container {
    padding:20px;
    margin-top:90px;
}

h2 { font-size:18px; }

#dateTime{
    margin:10px 0;
    color:#00e676;
    font-size:15px;
    font-weight:bold;
}

/* BOX */
.box{
    background:#111;
    color:#ccc;
    padding:10px;
    border-radius:10px;
    margin-bottom:15px;
    border:1px solid #222;
    font-size:14px;
    text-align:left;
}

/* NEWS */
.news-ticker {
    background:#111;
    border:1px solid #222;
    padding:10px;
    margin-bottom:15px;
    border-radius:10px;
    overflow:hidden;
    white-space:nowrap;
    font-size:13px;
    color:#00e676;
}

#newsText {
    display:inline-block;
    padding-left:100%;
    animation: scrollNews 18s linear infinite;
}

@keyframes scrollNews {
    0% { transform: translateX(0); }
    100% { transform: translateX(-100%); }
}

/* VIDEO */
video {
    width:100%;
    max-width:420px;
    border-radius:12px;
    margin-top:10px;
}

/* TIMER */
#statusText {
    margin-top: 12px;
    font-size: 15px;
    font-weight: bold;
    color: #00e676;
    animation: pulseText 1.2s infinite;
}

@keyframes pulseText {
    0% { opacity: 0.6; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.03); }
    100% { opacity: 0.6; transform: scale(1); }
}

#progressContainer {
    width: 90%;
    max-width: 320px;
    height: 10px;
    background: rgba(255,255,255,0.08);
    border-radius: 50px;
    margin: 12px auto;
    overflow: hidden;
}

#progressBar {
    width: 0%;
    height: 100%;
    background: linear-gradient(90deg, #00c853, #00e676);
    border-radius: 50px;
    transition: width 0.3s ease;
}
</style>
</head>

<body>

<!-- FULL MENU -->
<div class="top-menu">

<a href="index.html">🏠 Home</a>
<a href="watch.html">📺 Watch TV</a>
<a href="games.html">🎮 Games</a>
<a href="worldcams.html">🌍 World</a>
<a href="rensonchatroom.html">💬 Chat</a>
<a href="booking.html">🏡 Booking</a>
<a href="vision.html">🌿 Vision</a>

<button id="connectBtn" class="connect" disabled onclick="connectNet()">
CONNECT 🌐
</button>

<button class="trial" onclick="freeWifi()">
FREE WIFI ⚡
</button>

</div>

<div class="container">

<h2>🎮 Renson Barangay WiFi & EcoFarm Services</h2>

<div id="dateTime"></div>

<div class="news-ticker">
📰 <span id="newsText">Loading local news...</span>
</div>

<div class="box">☀️ Weather Today: Sunny • 31°C</div>

<div class="box">
📰 LATEST NEWS<br><br>
🚧 Road rehabilitation ongoing<br>
🌾 Agriculture projects<br>
⚠️ Security updates<br>
</div>

<video autoplay muted playsinline loop>
    <source src="ad.mp4" type="video/mp4">
</video>

<!-- TIMER -->
<p id="statusText">Please wait 10 seconds...</p>

<div id="progressContainer">
  <div id="progressBar"></div>
</div>

</div>

<audio id="bgmusic" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- MONETAG -->
<script src="https://n6wxm.com/vignette.min.js" data-zone="10950262" async></script>

<script>

/* CONNECT ACTION */
function connectNet(){
    alert("Connecting Internet...");
}

/* FREE WIFI ACTION */
function freeWifi(){
    window.location.href = "http://192.168.22.1/login?trial=1";
}

/* unlock connect */
setTimeout(() => {
    connectBtn.disabled = false;
}, 10000);

/* TIMER */
let duration = 10;
let timeLeft = duration;

let progressBar = document.getElementById("progressBar");
let statusText = document.getElementById("statusText");

let intervalUI = setInterval(() => {

    timeLeft--;

    progressBar.style.width =
    ((duration - timeLeft) / duration) * 100 + "%";

    statusText.innerText =
    "System loading... " + timeLeft + "s";

    if(timeLeft <= 0){
        clearInterval(intervalUI);
        statusText.innerText = "System Ready!";
    }

}, 1000);

/* MUSIC */
document.body.addEventListener("click", function () {
    let music = document.getElementById("bgmusic");
    music.volume = 0.2;
    music.play().catch(()=>{});
}, { once: true });

/* TIME */
setInterval(() => {
    let now = new Date();
    document.getElementById("dateTime").innerHTML =
    "📅 " + now.toLocaleDateString() +
    "<br>🕒 " + now.toLocaleTimeString();
}, 1000);

/* NEWS */
const newsList = [
"Lopez road improvement ongoing",
"Calauag cyber operations active",
"Quezon irrigation expansion",
"Barangay WiFi maintenance"
];

let index = 0;
function updateNews(){
    document.getElementById("newsText").innerText = newsList[index];
    index = (index + 1) % newsList.length;
}
updateNews();
setInterval(updateNews, 6000);

</script>

</body>
</html>
