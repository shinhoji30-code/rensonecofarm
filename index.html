<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

     crossorigin="anonymous"></script>

<script src="https://quge5.com/88/tag.min.js" 
data-zone="233397" async data-cfasync="false"></script>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #000;
    color: #fff;
    text-align: center;
}

.container {
    padding: 20px;
    margin-top: 40px;
}

h2 {
    font-size: 20px;
}

video {
    width: 100%;
    max-width: 400px;
    border-radius: 10px;
    margin-top: 10px;
}

button {
    margin-top: 15px;
    padding: 12px 20px;
    font-size: 15px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    width: 80%;
    max-width: 300px;
}

#connectBtn {
    background: #00c853;
    color: white;
}

#gameBtn {
    background: #2979ff;
    color: white;
}

button:disabled {
    background: gray;
}

.ad-box {
    margin: 10px 0;
}
</style>

</head>

<body>

<div class="container">

<h2>🎮 Renson Ecopark & Barangay WiFi Access Portal</h2>
<p>Watch short ad before access</p>

<!-- VIDEO AD -->
<video id="adsVideo" autoplay muted playsinline>
    <source src="ad.mp4" type="video/mp4">
</video>

<!-- ADS -->
<script>
  atOptions = {
    'key' : 'b2f331153ebe7677a3e5f2d39f278655',
    'format' : 'iframe',
    'height' : 250,
    'width' : 300,
    'params' : {}
  };
</script>
<script src="https://www.highperformanceformat.com/b2f331153ebe7677a3e5f2d39f278655/invoke.js"></script>

<div class="ad-box"></div>

<!-- BUTTONS -->
<button id="connectBtn" disabled onclick="goLogin()">
CONNECT INTERNET 🌐
</button>

<button id="gameBtn" disabled onclick="goGames()">
PLAY GAMES 🎮
</button>

</div>

<!-- BACKGROUND MUSIC -->
<audio id="bgmusic" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
let video = document.getElementById("adsVideo");
let connectBtn = document.getElementById("connectBtn");
let gameBtn = document.getElementById("gameBtn");

// unlock buttons after video ends
video.onended = function() {
    unlock();
};

// fallback timer (10 sec)
setTimeout(function(){
    unlock();
}, 10000);

function unlock(){
    connectBtn.disabled = false;
    gameBtn.disabled = false;
}

// CONNECT → MikroTik login
function goLogin(){
    window.location.href = "http://192.168.22.1/login2.html";
}

// GAMES → GitHub page
function goGames(){
    window.location.href = "https://rensonecoparkphil.com/snake/";
}

// BACKGROUND MUSIC (play on first click)
document.body.addEventListener("click", function () {
    let music = document.getElementById("bgmusic");
    music.volume = 0.2; // low volume para hindi nakakainis
    music.play().catch(()=>{});
}, { once: true });

</script>

</body>
</html>
