<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>World Live Cam Portal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    background:#000;
    color:#fff;
}

/* HEADER */
.header {
    text-align:center;
    padding:12px;
    font-size:16px;
    color:#00e676;
    background:#111;
}

/* STATUS */
.status {
    text-align:center;
    font-size:12px;
    color:#aaa;
    margin-bottom:10px;
}

/* CAM PLAYER */
.screen {
    padding:10px;
}

iframe {
    width:100%;
    height:220px;
    border-radius:12px;
    border:none;
}

/* TITLE */
#title {
    text-align:center;
    font-size:14px;
    color:#00e676;
    margin:10px 0;
}

/* BUTTON GRID */
.grid {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    padding:10px;
}

.btn {
    background:#111;
    border:1px solid #222;
    color:white;
    padding:14px;
    border-radius:12px;
    font-size:13px;
    text-align:center;
    cursor:pointer;
}

.btn:active{
    background:#00c853;
    color:black;
}

/* SOUND */
.sound {
    width:95%;
    margin:10px auto;
    display:block;
    background:#00c853;
    color:black;
    padding:14px;
    border:none;
    border-radius:30px;
    font-weight:bold;
}

/* BACK */
.back {
    position:fixed;
    bottom:10px;
    left:50%;
    transform:translateX(-50%);
    width:90%;
}

.back a {
    display:block;
    background:#00c853;
    color:black;
    text-decoration:none;
    text-align:center;
    padding:14px;
    border-radius:30px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="header">🌍 WORLD LIVE CAM</div>

<div class="status">🛰️ System Online • Operator: Renson</div>

<div class="screen">

<p id="title">📡 New York City Live</p>

<iframe id="cam"
src="https://www.youtube.com/embed/q-zthUJSghc?autoplay=1&mute=1"
allow="autoplay; encrypted-media"
allowfullscreen>
</iframe>

</div>

<!-- SOUND -->
<button class="sound" onclick="toggleSound()">🔊 TOGGLE SOUND</button>

<!-- CAM BUTTONS -->
<div class="grid">

<div class="btn" onclick="loadCam('newyork')">🇺🇸 New York</div>
<div class="btn" onclick="loadCam('davao')">🇵🇭 Davao</div>
<div class="btn" onclick="loadCam('losangeles')">🇺🇸 LA</div>
<div class="btn" onclick="loadCam('fremont')">🇺🇸 Fremont</div>

</div>

<!-- BACK -->
<div class="back">
<a href="index.html">⬅ Back to Home</a>
</div>

<script>

const cams = {
newyork:{
title:"New York City",
url:"https://www.youtube.com/embed/q-zthUJSghc?autoplay=1&mute=1"
},
davao:{
title:"Davao City",
url:"https://www.youtube.com/embed/I_pE-WeOvNs?autoplay=1&mute=1"
},
losangeles:{
title:"Los Angeles",
url:"https://www.youtube.com/embed/EO_1LWqsCNE?autoplay=1&mute=1"
},
fremont:{
title:"Fremont",
url:"https://www.youtube.com/embed/gDcfh-Wm0xE?autoplay=1&mute=1"
}
};

function loadCam(city){
document.getElementById("cam").src = cams[city].url;
document.getElementById("title").innerText = "📡 " + cams[city].title;
}

/* SOUND */
let soundOn = false;

function toggleSound(){
let cam = document.getElementById("cam");

if(cam.src.includes("mute=1")){
cam.src = cam.src.replace("mute=1","mute=0");
} else {
cam.src += "&mute=0";
}
}

</script>

</body>
</html>
