<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>World Live Cam Portal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    background:#000;
    color:#fff;
    text-align:center;
}

/* HEADER */
h2 {
    margin-top:20px;
    font-size:18px;
    color:#00e676;
}

.header {
    font-size:13px;
    color:#aaa;
    margin-bottom:10px;
}

/* CONTAINER */
.container {
    padding:15px;
}

/* MAP PANEL */
.map {
    width:100%;
    max-width:500px;
    margin:auto;
    padding:10px;
    border:1px solid #222;
    border-radius:10px;
    background:#111;
}

/* BUTTONS */
.btn {
    background:#222;
    color:#fff;
    border:1px solid #333;
    padding:10px;
    margin:5px;
    border-radius:8px;
    cursor:pointer;
    font-size:13px;
}

.btn:hover {
    background:#00c853;
}

/* SCREEN */
.screen {
    margin-top:15px;
    background:#111;
    border:1px solid #222;
    border-radius:10px;
    padding:10px;
}

/* IFRAME */
iframe {
    width:100%;
    height:230px;
    border-radius:10px;
    border:1px solid #333;
}

/* TITLE */
#title {
    font-size:14px;
    margin-bottom:10px;
    color:#00e676;
}
</style>
</head>

<body>

<h2>🌍 WORLD LIVE CAM CONTROL CENTER</h2>

<div class="header">
👤 Operator: <b>Renson</b> | 🛰️ System Online
</div>

<div class="container">

<!-- CITY SELECTOR -->
<div class="map">
    🗺️ Select Live Camera<br>

    <button class="btn" onclick="loadCam('newyork')">🇺🇸 New York</button>
    <button class="btn" onclick="loadCam('davao')">🇵🇭 Davao City</button>
    <button class="btn" onclick="loadCam('losangeles')">🇺🇸 Los Angeles</button>
    <button class="btn" onclick="loadCam('fremont')">🇺🇸 Fremont</button>
</div>

<!-- SCREEN -->
<div class="screen">

<p id="title">📡 Live Feed: New York City</p>

<iframe id="cam"
src="https://www.youtube.com/embed/q-zthUJSghc?si=l0SjJOrqu6vXPdEB"
allowfullscreen>
</iframe>

</div>

</div>

<script>

/* CAM DATABASE */
const cams = {
    newyork: {
        title: "New York City Live",
        url: "https://www.youtube.com/embed/q-zthUJSghc?si=l0SjJOrqu6vXPdEB"
    },
    davao: {
        title: "Davao City Live",
        url: "https://www.youtube.com/embed/I_pE-WeOvNs?si=Fz6BOT3EYiugHbT3"
    },
    losangeles: {
        title: "Los Angeles Live",
        url: "https://www.youtube.com/embed/EO_1LWqsCNE?si=IG6uUr1wQ_L1Ffdm"
    },
    fremont: {
        title: "Fremont Live",
        url: "https://www.youtube.com/embed/gDcfh-Wm0xE?si=mKkyIV7QpWtQeis-"
    }
};

/* SWITCH CAMERA */
function loadCam(city){
    document.getElementById("cam").src = cams[city].url;
    document.getElementById("title").innerText = "📡 Live Feed: " + cams[city].title;
}

</script>

</body>
</html>
