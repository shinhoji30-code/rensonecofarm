<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>World Live Cam Portal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    background:#000;
    color:#fff;
    text-align:center;
}

h2 {
    margin-top:20px;
    font-size:18px;
    color:#00e676;
}

.header {
    font-size:13px;
    color:#aaa;
    margin-bottom:10px;
}

.container {
    padding:15px;
}

/* PANEL */
.map {
    width:100%;
    max-width:500px;
    margin:auto;
    padding:10px;
    border:1px solid #222;
    border-radius:10px;
    background:#111;
}

.btn {
    background:#222;
    color:#fff;
    border:1px solid #333;
    padding:10px;
    margin:5px;
    border-radius:8px;
    cursor:pointer;
    font-size:13px;
}

.btn:hover {
    background:#00c853;
}

/* SCREEN */
.screen {
    margin-top:15px;
    background:#111;
    border:1px solid #222;
    border-radius:10px;
    padding:10px;
}

iframe {
    width:100%;
    height:230px;
    border-radius:10px;
    border:1px solid #333;
}

#title {
    font-size:14px;
    margin-bottom:10px;
    color:#00e676;
}

/* SOUND BUTTON */
.soundBtn {
    margin-top:10px;
    background:#00c853;
    color:#000;
    border:none;
    padding:10px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}
</style>
</head>

<body>

<h2>🌍 WORLD LIVE CAM CONTROL CENTER</h2>

<div class="header">
👤 Operator: <b>Renson</b> | 🛰️ System Online
</div>

<div class="container">

<!-- SELECTOR -->
<div class="map">
    🗺️ Select Camera<br>

    <button class="btn" onclick="loadCam('newyork')">🇺🇸 New York</button>
    <button class="btn" onclick="loadCam('davao')">🇵🇭 Davao City</button>
    <button class="btn" onclick="loadCam('losangeles')">🇺🇸 Los Angeles</button>
    <button class="btn" onclick="loadCam('fremont')">🇺🇸 Fremont</button>

    <br>
    <button class="soundBtn" onclick="toggleSound()">🔊 SOUND</button>
</div>

<!-- SCREEN -->
<div class="screen">

<p id="title">📡 Live Feed: New York City</p>

<iframe id="cam"
src="https://www.youtube.com/embed/q-zthUJSghc?autoplay=1&mute=1"
allow="autoplay; encrypted-media"
allowfullscreen>
</iframe>

</div>

</div>

<!-- 🎧 BACKGROUND SOUND -->
<audio id="bgSound" loop>
    <source src="ambient.mp3" type="audio/mpeg">
</audio>

<script>

/* CAMS */
const cams = {
    newyork: {
        title: "New York City Live",
        url: "https://www.youtube.com/embed/q-zthUJSghc?autoplay=1&mute=1"
    },
    davao: {
        title: "Davao City Live",
        url: "https://www.youtube.com/embed/I_pE-WeOvNs?autoplay=1&mute=1"
    },
    losangeles: {
        title: "Los Angeles Live",
        url: "https://www.youtube.com/embed/EO_1LWqsCNE?autoplay=1&mute=1"
    },
    fremont: {
        title: "Fremont Live",
        url: "https://www.youtube.com/embed/gDcfh-Wm0xE?autoplay=1&mute=1"
    }
};

/* SWITCH CAM */
function loadCam(city){
    document.getElementById("cam").src = cams[city].url;
    document.getElementById("title").innerText =
    "📡 Live Feed: " + cams[city].title;
}

/* SOUND CONTROL */
let soundOn = false;

function toggleSound(){
    let sound = document.getElementById("bgSound");

    if(soundOn){
        sound.pause();
        soundOn = false;
    } else {
        sound.volume = 0.3;
        sound.play().catch(()=>{});
        soundOn = true;
    }
}

/* AUTO SOUND START (after click anywhere) */
document.body.addEventListener("click", function () {
    let sound = document.getElementById("bgSound");
    sound.volume = 0.2;
    sound.play().catch(()=>{});
}, { once: true });

</script>

</body>
</html>
