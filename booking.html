<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EcoFarm Booking</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family: Arial;
  background:#f4f4f4;
  margin:0;
  padding:20px;
}

.container{
  max-width:500px;
  margin:auto;
  background:#fff;
  padding:20px;
  border-radius:12px;
}

h2{text-align:center}

input, select{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  width:100%;
  padding:12px;
  margin-top:15px;
  background:green;
  color:white;
  border:none;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="container">

<h2>🏡 EcoFarm Booking</h2>
<p style="text-align:center;">📶 Free WiFi Available</p>

<input placeholder="Full Name">
<input placeholder="Phone Number">

<select>
  <option>Non-Aircon - ₱500 (4 pax)</option>
  <option>Aircon - ₱800 (4 pax)</option>
</select>

<input type="number" placeholder="Number of Guests">

<label>
<input type="checkbox"> Cooking Fee (+₱200)
</label>

<select>
  <option>Cash</option>
  <option>GCash</option>
  <option>Bank Transfer</option>
</select>

<button onclick="alert('Booking Sent!')">Submit Booking</button>

</div>

</body>
</html>
