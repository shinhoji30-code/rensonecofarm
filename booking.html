<script>

// TOTAL CALC
function computeTotal(){

    let room = document.getElementById("room").value;
    let pax = parseInt(document.getElementById("pax").value || 4);
    let cook = document.getElementById("cook").checked;

    let base = room.includes("800") ? 800 : 500;

    let checkin = document.getElementById("checkin").value;
    let checkout = document.getElementById("checkout").value;

    let days = 1;
    if(checkin && checkout){
        let d1 = new Date(checkin);
        let d2 = new Date(checkout);
        let diff = (d2 - d1) / (1000*60*60*24);
        if(diff > 0) days = diff;
    }

    let total = (base * days) + (pax > 4 ? (pax-4)*100*days : 0) + (cook ? 200 : 0);

    document.getElementById("totalDisplay").innerText = "₱" + total;

    return total;
}


// SUBMIT
function submitBooking(){

    let total = computeTotal();

    emailjs.send("service_43fy2w9", "template_fj8bq3s", {
        name: document.getElementById("name").value,
        phone: document.getElementById("phone").value,
        room: document.getElementById("room").value,
        pax: document.getElementById("pax").value,
        payment: document.getElementById("payment").value,
        cook: document.getElementById("cook").checked ? "Yes" : "No",
        total: total,
        checkin: document.getElementById("checkin").value,
        checkout: document.getElementById("checkout").value,
        time: new Date().toLocaleString()
    })
    .then(()=> alert("Booking sent! ₱" + total))
    .catch(err => console.log(err));
}

</script>
