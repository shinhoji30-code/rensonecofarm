<script>

/* AUTO LOAD DEFAULT CHANNEL */
window.onload = function(){
    playTV("https://www.youtube.com/embed/NwMT6vEGKJ8?autoplay=1&controls=0&mute=1&rel=0");
};

/* PLAY CHANNEL */
function playTV(url){
    document.getElementById("tv").src = url;
}

/* SOUND */
function enableSound(){
    let tv = document.getElementById("tv");

    if(tv.src.includes("mute=1")){
        tv.src = tv.src.replace("mute=1","mute=0");
    } else {
        tv.src = tv.src + "&mute=0";
    }
}
