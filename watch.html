<style>
body {

.channel-btn {

/* TV SCREEN */

</style>
</head>

<body>

<div class="header">

<!-- 🔥 TOP AD AREA (NATIVE / BANNER CAN BE HERE) -->

    <!-- optional smartlink -->

       style="color:#00c853; text-decoration:none;">
       🎯 Watch More Offers
    </a>
</div>

<!-- CHANNEL BUTTONS -->
<button class="channel-btn" onclick="playTV('https://www.youtube.com/embed/NwMT6vEGKJ8?autoplay=1&controls=0&mute=1&rel=0')">

</button>

<!-- SOUND CONTROL -->

🔊 TURN ON SOUND
</button>

<!-- 🔥 MID BANNER AD (300x250 OR NATIVES) -->
<div class="adbox">

<!-- Banner 300x250 -->
<script>
  atOptions = {
    'key' : 'b2f331153ebe7677a3e5f2d39f278655',
    'format' : 'iframe',

</div>

<!-- TV PLAYER -->
<iframe id="tv"
allow="autoplay; fullscreen"
allowfullscreen></iframe>

<!-- 🔥 BOTTOM AD (160x300) -->
<div class="adbox">

<script>
  atOptions = {
    'key' : 'c47c1f01991eef3f74d64a9d67aa2b2a',
    'format' : 'iframe',

</script>

</div>

<script>

/* LOAD CHANNEL */
function playTV(url){
    document.getElementById("tv").src = url;
}

/* SOUND FIX */
function enableSound(){
    let tv = document.getElementById("tv");

    if(tv.src.includes("mute=1")){
        tv.src = tv.src.replace("mute=1","mute=0");
    } else {
        tv.src = tv.src + "&mute=0";
    }
}

</script>
