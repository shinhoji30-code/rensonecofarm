<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Renson Chat Room</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    font-family: Arial, sans-serif;
    color: white;
}

/* HEADER */
.header {
    padding: 15px;
    font-size: 18px;
    font-weight: bold;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(10px);
    display:flex;
    align-items:center;
    justify-content:space-between;
}

/* BACK BUTTON */
.back-btn{
    background:#00c853;
    border:none;
    padding:8px 12px;
    border-radius:8px;
    font-size:13px;
    font-weight:bold;
    color:black;
}

/* CHAT AREA FULL HEIGHT */
.chat-container {
    flex: 1;
    padding:10px;
}

/* CHAT BOX */
.chat-box {
    width:100%;
    height:100%;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 0 20px rgba(0,0,0,0.5);
}

/* FOOTER */
.footer {
    text-align:center;
    font-size:11px;
    padding:5px;
    opacity:0.6;
}

/* MOBILE */
@media (max-width:600px){
    .header{
        font-size:16px;
    }
}
</style>

</head>

<body>

<div class="header">
<span>💬 Renson Chat</span>
<button class="back-btn" onclick="goHome()">⬅ Back</button>
</div>

<div class="chat-container">
    <div class="chat-box">

        <!-- CHATANGO EMBED FULL HEIGHT -->
        <script id="cid0020000438633100540" async 
        src="//st.chatango.com/js/gz/emb.js"
        style="width: 100%; height: 100%;">
        {
            "handle":"rensonchatroom",
            "arch":"js",
            "styles":{
                "a":"00c853",
                "b":100,
                "c":"FFFFFF",
                "d":"FFFFFF",
                "k":"00c853",
                "l":"00c853",
                "m":"00c853",
                "n":"FFFFFF",
                "p":"10",
                "q":"00c853",
                "r":100
            }
        }
        </script>

    </div>
</div>

<div class="footer">
© 2026 Renson EcoFarm • Chat System
</div>

<script>
function goHome(){
    window.location.href="index.html";
}
</script>

</body>
</html>
